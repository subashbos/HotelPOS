sonar.projectKey=subashbos_HotelPOS

# EF Core migrations are auto-generated scaffolding (Up/Down calls mirroring near-identical
# table/column definitions); their repetition is required by the ORM's format and isn't
# meaningful duplication, so exclude them from copy-paste detection.
sonar.cpd.exclusions=**/Migrations/**

# S2325 ("make member static") is a false positive across the WPF project: the analyzer's
# snapshot doesn't include XAML-compiler-generated x:Name fields, CommunityToolkit.Mvvm
# source-generated [ObservableProperty]/[RelayCommand] members, IValueConverter/IMultiValueConverter
# interface implementations, or DependencyProperty CLR wrappers - so it flags members that
# actually do use instance state the analyzer can't see. Applying the suggested fix breaks the
# build (CS0176 for XAML-wired event handlers, "does not implement interface member" for
# converters) or silently breaks WPF data binding at runtime (bound properties can't be static).
# Verified by reproducing the CS0176 build failure before adding this exclusion.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2325
sonar.issue.ignore.multicriteria.e1.resourceKey=src/HotelPOS/**/*
