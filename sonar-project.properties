sonar.projectKey=subashbos_HotelPOS

# EF Core migrations, WPF ViewModels, and WPF Views are excluded from Copy-Paste Detection (CPD)
# because they contain a high volume of boilerplate/scaffolded code causing false-positive duplication flags.
sonar.cpd.exclusions=**/Migrations/**,**/ViewModels/**,**/Views/**

# S2325 ("make member static") is a false positive across the WPF project: the analyzer's
# snapshot doesn't include XAML-compiler-generated x:Name fields, CommunityToolkit.Mvvm
# source-generated [ObservableProperty]/[RelayCommand] members, IValueConverter/IMultiValueConverter
# interface implementations, or DependencyProperty CLR wrappers - so it flags members that
# actually do use instance state the analyzer can't see. Applying the suggested fix breaks the
# build (CS0176 for XAML-wired event handlers, "does not implement interface member" for
# converters) or silently breaks WPF data binding at runtime (bound properties can't be static).
# Verified by reproducing the CS0176 build failure before adding this exclusion.
#
# NOTE (2026-07-13): SonarCloud Automatic Analysis does NOT honor
# sonar.issue.ignore.multicriteria (verified: analysis of 9d4efa18, which contained these
# entries, still raised S2325 in src/HotelPOS and left the two S2077 hotspots open).
# In-code "// NOSONAR" markers DO work and are the effective suppression mechanism; the
# entries below are kept for documentation and in case the project moves to CI-based scans.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S2325
sonar.issue.ignore.multicriteria.e1.resourceKey=src/HotelPOS/**/*

# The two S2077 SQL-injection hotspots in BackupService are reviewed-safe: BACKUP/RESTORE
# DATABASE statements must interpolate the database name because SQL identifiers cannot be
# bound as parameters. The name is allowlist-validated (^[A-Za-z0-9_]+$ via
# EnsureSafeIdentifier) and bracket-quoted with SqlCommandBuilder.QuoteIdentifier before
# interpolation; the only externally-influenced values (backup file paths) ARE bound as real
# SQL parameters. Reasoning is also documented inline at the call sites. Excluded here
# because hotspot review requires SonarCloud UI access; scoped to this one file so S2077
# still fires anywhere else.
sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S2077
sonar.issue.ignore.multicriteria.e2.resourceKey=src/HotelPOS/Services/BackupService.cs
