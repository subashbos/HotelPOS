name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dotnet:
    name: .NET Build & Test
    # HotelPOS.WPF and HotelPOS.Tests target net10.0-windows with UseWPF=true,
    # which only builds on a Windows toolchain.
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore HotelPOS.sln

      - name: Build
        run: dotnet build HotelPOS.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test HotelPOS.sln --no-build --configuration Release --logger trx --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: success() || failure()
        with:
          name: .NET Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx

  angular:
    name: Angular Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src/HotelPOS.Client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/HotelPOS.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI
