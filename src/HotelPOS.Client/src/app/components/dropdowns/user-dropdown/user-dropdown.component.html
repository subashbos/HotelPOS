<a
  class="text-blueGray-500 block"
  href="javascript:void(0)"
  (click)="toggleDropdown($event)"
  #btnDropdownRef
>
  <div class="items-center flex">
    <span
      class="w-12 h-12 text-sm text-white bg-blueGray-200 inline-flex items-center justify-center rounded-full"
    >
      <img
        alt="..."
        class="w-full rounded-full align-middle border-none shadow-lg"
        src="assets/img/team-1-800x800.jpg"
      />
    </span>
  </div>
</a>
<div class="min-w-48 z-50" #popoverDropdownRef>
  <div
    class="bg-white text-base z-50 float-left py-2 list-none text-left rounded shadow-lg mt-1 min-w-48"
    [ngClass]="dropdownPopoverShow ? 'block' : 'hidden'"
  >
    <span
      *ngIf="username"
      class="text-xs py-2 px-4 font-bold block w-full whitespace-nowrap text-blueGray-400 uppercase"
    >
      {{ username }}
    </span>
    <a
      [routerLink]="['/admin/account']"
      (click)="dropdownPopoverShow = false"
      class="text-sm py-2 px-4 font-normal block w-full whitespace-nowrap bg-transparent text-blueGray-700 hover:bg-blueGray-100"
    >
      <i class="fas fa-user-cog mr-2 text-blueGray-400"></i> My Account
    </a>
    <div class="h-0 my-2 border border-solid border-blueGray-100"></div>
    <a
      href="javascript:void(0)"
      (click)="logout($event)"
      class="text-sm py-2 px-4 font-normal block w-full whitespace-nowrap bg-transparent text-blueGray-700 hover:bg-blueGray-100"
    >
      <i class="fas fa-sign-out-alt mr-2 text-blueGray-400"></i> Logout
    </a>
  </div>
</div>
