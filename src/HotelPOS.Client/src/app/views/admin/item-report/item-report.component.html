<div class="flex flex-wrap mt-4">
  <div class="w-full mb-12 px-4">
    <div class="relative flex flex-col min-w-0 break-words bg-white w-full mb-6 shadow-lg rounded">
      <div class="rounded-t mb-0 px-6 py-4 border-b border-solid border-blueGray-200">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <h3 class="font-semibold text-lg text-blueGray-700">
            <i class="fas fa-chart-pie text-blueGray-400 mr-2"></i> Item Report
            <span class="text-xs text-blueGray-400 normal-case ml-2 font-normal">Total: {{ totalRevenue | number:'1.2-2' }}</span>
          </h3>
          <div class="flex items-end gap-3">
            <div>
              <label for="ir-from" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">From</label>
              <input id="ir-from" type="date" [(ngModel)]="fromDate" name="fromDate" (change)="load()"
                class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow focus:outline-none focus:ring" />
            </div>
            <div>
              <label for="ir-to" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">To</label>
              <input id="ir-to" type="date" [(ngModel)]="toDate" name="toDate" (change)="load()"
                class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow focus:outline-none focus:ring" />
            </div>
          </div>
        </div>
      </div>
      <div class="px-6 py-4">
        <p *ngIf="loadError" class="text-red-600 text-sm mb-4">{{ loadError }}</p>
        <p *ngIf="isLoading" class="text-blueGray-400 text-sm mb-4">Loading item report...</p>

        <div class="block w-full overflow-x-auto" *ngIf="!isLoading">
          <table class="items-center w-full bg-transparent border-collapse">
            <thead>
              <tr>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-left">Item</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-right">Qty Sold</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-right">Unit Price</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-right">Revenue</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of rows">
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 font-semibold">{{ row.itemName }}</td>
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 text-right">{{ row.totalQtySold }}</td>
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 text-right">{{ row.unitPrice | number:'1.2-2' }}</td>
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 text-right font-semibold">{{ row.totalRevenue | number:'1.2-2' }}</td>
              </tr>
              <tr *ngIf="rows.length === 0">
                <td colspan="4" class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs p-4 text-center text-blueGray-400">No data in this range.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
