<div class="flex flex-wrap mt-4">
  <div class="w-full mb-12 px-4">
    <div class="relative flex flex-col min-w-0 break-words bg-white w-full mb-6 shadow-lg rounded">

      <!-- Header -->
      <div class="rounded-t mb-0 px-6 py-4 border-b border-solid border-blueGray-200">
        <div class="flex flex-wrap items-center justify-between">
          <h3 class="font-semibold text-lg text-blueGray-700">
            <i class="fas fa-user-shield text-blueGray-400 mr-2"></i> Roles &amp; Access
          </h3>
          <button (click)="openCreateForm()"
            class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow">
            <i class="fas fa-plus mr-1"></i> Add Role
          </button>
        </div>
      </div>

      <div class="px-6 py-4">
        <p *ngIf="actionError" class="text-red-600 text-sm mb-4">{{ actionError }}</p>
        <p *ngIf="loadError" class="text-red-600 text-sm mb-4">{{ loadError }}</p>
        <p *ngIf="isLoading" class="text-blueGray-400 text-sm mb-4">Loading roles...</p>

        <div class="block w-full overflow-x-auto" *ngIf="!isLoading">
          <table class="items-center w-full bg-transparent border-collapse">
            <thead>
              <tr>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-left">Name</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-left">Description</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let role of roles; trackBy: trackByRoleId">
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 font-semibold">{{ role.name }}</td>
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4">{{ role.description || '—' }}</td>
                <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 text-right">
                  <button (click)="editPermissions(role)" class="text-blueGray-500 hover:text-blueGray-700 font-bold mr-3"><i class="fas fa-key"></i> Permissions</button>
                  <button (click)="deleteRole(role)" class="text-red-500 hover:text-red-700 font-bold"><i class="fas fa-trash"></i></button>
                </td>
              </tr>
              <tr *ngIf="roles.length === 0">
                <td colspan="3" class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs p-4 text-center text-blueGray-400">No roles yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create role modal -->
<div *ngIf="showCreateForm" class="fixed z-50 inset-0 overflow-y-auto flex items-center justify-center p-4">
  <button type="button" class="fixed inset-0 bg-black opacity-50 border-0 cursor-default focus-visible:ring-2 focus-visible:ring-red-500" (click)="closeCreateForm()" aria-label="Close role form"></button>
  <div class="relative bg-white rounded-lg shadow-xl w-full max-w-sm mx-auto z-10 overflow-hidden">
    <div class="bg-red-600 px-6 py-4 text-white flex justify-between items-center">
      <h3 class="font-bold text-base uppercase">Add Role</h3>
      <button (click)="closeCreateForm()" class="text-white hover:text-blueGray-200"><i class="fas fa-times"></i></button>
    </div>
    <form (ngSubmit)="createRole()" class="p-6 space-y-4">
      <div>
        <label for="role-name" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Name</label>
        <input id="role-name" type="text" [(ngModel)]="newRoleName" name="newRoleName" required
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <div>
        <label for="role-desc" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Description</label>
        <input id="role-desc" type="text" [(ngModel)]="newRoleDescription" name="newRoleDescription"
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <p *ngIf="actionError" class="text-red-600 text-sm">{{ actionError }}</p>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="closeCreateForm()" class="text-blueGray-500 text-xs font-bold uppercase px-4 py-2">Cancel</button>
        <button type="submit" [disabled]="isSaving || !newRoleName.trim()"
          class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow disabled:opacity-50">
          {{ isSaving ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Permissions editor modal -->
<div *ngIf="editingRole" class="fixed z-50 inset-0 overflow-y-auto flex items-center justify-center p-4">
  <button type="button" class="fixed inset-0 bg-black opacity-50 border-0 cursor-default focus-visible:ring-2 focus-visible:ring-red-500" (click)="closePermissionsEditor()" aria-label="Close permissions editor"></button>
  <div class="relative bg-white rounded-lg shadow-xl w-full max-w-2xl mx-auto z-10 overflow-hidden max-h-[90vh] overflow-y-auto">
    <div class="bg-red-600 px-6 py-4 text-white flex justify-between items-center">
      <h3 class="font-bold text-base uppercase">Permissions — {{ editingRole.name }}</h3>
      <button (click)="closePermissionsEditor()" class="text-white hover:text-blueGray-200"><i class="fas fa-times"></i></button>
    </div>
    <div class="p-6">
      <div class="block w-full overflow-x-auto">
        <table class="items-center w-full bg-transparent border-collapse">
          <thead>
            <tr>
              <th class="px-3 bg-blueGray-50 text-blueGray-500 border border-solid border-blueGray-100 py-2 text-xs uppercase text-left">Module</th>
              <th class="px-3 bg-blueGray-50 text-blueGray-500 border border-solid border-blueGray-100 py-2 text-xs uppercase text-center">Access</th>
              <th class="px-3 bg-blueGray-50 text-blueGray-500 border border-solid border-blueGray-100 py-2 text-xs uppercase text-center">Edit</th>
              <th class="px-3 bg-blueGray-50 text-blueGray-500 border border-solid border-blueGray-100 py-2 text-xs uppercase text-center">Delete</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let perm of editingPermissions">
              <td class="border-t-0 px-3 align-middle border-l-0 border-r-0 text-xs p-3">{{ perm.moduleName }}</td>
              <td class="border-t-0 px-3 align-middle border-l-0 border-r-0 text-xs p-3 text-center"><input type="checkbox" [(ngModel)]="perm.canAccess" [name]="'access-' + perm.moduleName" [attr.aria-label]="'Access to ' + perm.moduleName" class="rounded" /></td>
              <td class="border-t-0 px-3 align-middle border-l-0 border-r-0 text-xs p-3 text-center"><input type="checkbox" [(ngModel)]="perm.canEdit" [name]="'edit-' + perm.moduleName" [attr.aria-label]="'Edit ' + perm.moduleName" class="rounded" /></td>
              <td class="border-t-0 px-3 align-middle border-l-0 border-r-0 text-xs p-3 text-center"><input type="checkbox" [(ngModel)]="perm.canDelete" [name]="'delete-' + perm.moduleName" [attr.aria-label]="'Delete ' + perm.moduleName" class="rounded" /></td>
            </tr>
          </tbody>
        </table>
      </div>

      <p *ngIf="actionError" class="text-red-600 text-sm mt-4">{{ actionError }}</p>

      <div class="flex justify-end gap-3 pt-4">
        <button type="button" (click)="closePermissionsEditor()" class="text-blueGray-500 text-xs font-bold uppercase px-4 py-2">Cancel</button>
        <button type="button" (click)="savePermissions()" [disabled]="isSaving"
          class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow disabled:opacity-50">
          {{ isSaving ? 'Saving...' : 'Save Permissions' }}
        </button>
      </div>
    </div>
  </div>
</div>
