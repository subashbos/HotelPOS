<div class="flex flex-wrap mt-4">
  <div class="w-full mb-12 px-4">
    <div class="relative flex flex-col min-w-0 break-words bg-white w-full mb-6 shadow-lg rounded">

      <!-- Header -->
      <div class="rounded-t mb-0 px-6 py-4 border-b border-solid border-blueGray-200">
        <div class="flex flex-wrap items-center justify-between">
          <h3 class="font-semibold text-lg text-blueGray-700">
            <i class="fas fa-users-cog text-blueGray-400 mr-2"></i> Users
          </h3>
          <button (click)="openAddForm()"
            class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow">
            <i class="fas fa-plus mr-1"></i> Add User
          </button>
        </div>
      </div>

      <div class="px-6 py-4">
        <p *ngIf="actionError" class="text-red-600 text-sm mb-4">{{ actionError }}</p>
        <p *ngIf="loadError" class="text-red-600 text-sm mb-4">{{ loadError }}</p>
        <p *ngIf="isLoading" class="text-blueGray-400 text-sm mb-4">Loading users...</p>

        <div class="block w-full overflow-x-auto" *ngIf="!isLoading">
          <table class="items-center w-full bg-transparent border-collapse">
            <thead>
              <tr>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-left">Username</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-left">Role</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-left">Status</th>
                <th class="px-4 bg-blueGray-50 text-blueGray-500 align-middle border border-solid border-blueGray-100 py-3 text-xs uppercase text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              <ng-container *ngFor="let user of users; trackBy: trackByUserId">
                <tr>
                  <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 font-semibold">{{ user.username }}</td>
                  <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4">{{ user.role }}</td>
                  <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4">
                    <span class="px-2 py-1 rounded text-xs font-bold uppercase"
                      [ngClass]="user.isActive ? 'bg-emerald-100 text-emerald-600' : 'bg-blueGray-100 text-blueGray-500'">
                      {{ user.isActive ? 'Active' : 'Inactive' }}
                    </span>
                  </td>
                  <td class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs whitespace-nowrap p-4 text-right">
                    <button (click)="toggleActive(user)" class="text-blueGray-500 hover:text-blueGray-700 font-bold mr-3">
                      <i class="fas" [ngClass]="user.isActive ? 'fa-user-slash' : 'fa-user-check'"></i>
                    </button>
                    <button (click)="startEditEmail(user)" class="text-blueGray-500 hover:text-blueGray-700 font-bold mr-3"><i class="fas fa-envelope"></i></button>
                    <button (click)="startReset(user)" class="text-blueGray-500 hover:text-blueGray-700 font-bold mr-3"><i class="fas fa-key"></i></button>
                    <button (click)="deleteUser(user)" class="text-red-500 hover:text-red-700 font-bold"><i class="fas fa-trash"></i></button>
                  </td>
                </tr>
                <tr *ngIf="resettingUserId === user.id">
                  <td colspan="4" class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs p-4 bg-blueGray-50">
                    <div class="flex items-center gap-2">
                      <label [attr.for]="'reset-password-' + user.id" class="sr-only">New password</label>
                      <input [attr.id]="'reset-password-' + user.id" type="password" [(ngModel)]="resetPasswordValue" name="resetPasswordValue" placeholder="New password"
                        class="border-0 px-3 py-2 text-blueGray-600 bg-white rounded text-xs shadow flex-1 focus:outline-none focus:ring" />
                      <button (click)="confirmReset(user)" [disabled]="!resetPasswordValue"
                        class="bg-red-600 text-white text-xs font-bold uppercase px-3 py-2 rounded shadow disabled:opacity-50">Reset</button>
                      <button (click)="cancelReset()" class="text-blueGray-500 text-xs font-bold uppercase px-3 py-2">Cancel</button>
                    </div>
                  </td>
                </tr>
                <tr *ngIf="editingEmailUserId === user.id">
                  <td colspan="4" class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs p-4 bg-blueGray-50">
                    <div class="flex items-center gap-2">
                      <label [attr.for]="'edit-email-' + user.id" class="sr-only">Email address</label>
                      <input [attr.id]="'edit-email-' + user.id" type="email" [(ngModel)]="emailValue" name="emailValue" placeholder="user@example.com"
                        class="border-0 px-3 py-2 text-blueGray-600 bg-white rounded text-xs shadow flex-1 focus:outline-none focus:ring" />
                      <button (click)="confirmEditEmail(user)"
                        class="bg-red-600 text-white text-xs font-bold uppercase px-3 py-2 rounded shadow">Save</button>
                      <button (click)="cancelEditEmail()" class="text-blueGray-500 text-xs font-bold uppercase px-3 py-2">Cancel</button>
                    </div>
                  </td>
                </tr>
              </ng-container>
              <tr *ngIf="users.length === 0">
                <td colspan="4" class="border-t-0 px-4 align-middle border-l-0 border-r-0 text-xs p-4 text-center text-blueGray-400">No users yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add user modal -->
<div *ngIf="showForm" class="fixed z-50 inset-0 overflow-y-auto flex items-center justify-center p-4">
  <button type="button" class="fixed inset-0 bg-black opacity-50 border-0 cursor-default focus-visible:ring-2 focus-visible:ring-red-500" (click)="closeForm()" aria-label="Close user form"></button>
  <div class="relative bg-white rounded-lg shadow-xl w-full max-w-sm mx-auto z-10 overflow-hidden">
    <div class="bg-red-600 px-6 py-4 text-white flex justify-between items-center">
      <h3 class="font-bold text-base uppercase">Add User</h3>
      <button (click)="closeForm()" class="text-white hover:text-blueGray-200"><i class="fas fa-times"></i></button>
    </div>
    <form (ngSubmit)="createUser()" class="p-6 space-y-4">
      <div>
        <label for="user-username" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Username</label>
        <input id="user-username" type="text" [(ngModel)]="newUsername" name="newUsername" required
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <div>
        <label for="user-password" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Password</label>
        <input id="user-password" type="password" [(ngModel)]="newPassword" name="newPassword" required
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <div>
        <label for="user-role" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Role</label>
        <select id="user-role" [(ngModel)]="newRoleId" name="newRoleId"
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring">
          <option *ngFor="let role of roles" [ngValue]="role.id">{{ role.name }}</option>
        </select>
      </div>
      <p *ngIf="actionError" class="text-red-600 text-sm">{{ actionError }}</p>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="closeForm()" class="text-blueGray-500 text-xs font-bold uppercase px-4 py-2">Cancel</button>
        <button type="submit" [disabled]="isSaving || !newUsername.trim() || !newPassword || !newRoleId"
          class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow disabled:opacity-50">
          {{ isSaving ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
