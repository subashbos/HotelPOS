<div class="flex flex-wrap mt-4">
  <div class="w-full mb-12 px-4">
    <div class="relative flex flex-col min-w-0 break-words bg-white w-full mb-6 shadow-lg rounded">

      <!-- Header -->
      <div class="rounded-t mb-0 px-6 py-4 border-b border-solid border-blueGray-200">
        <div class="flex flex-wrap items-center justify-between">
          <h3 class="font-semibold text-lg text-blueGray-700">
            <i class="fas fa-chair text-blueGray-400 mr-2"></i> Dining Tables
          </h3>
          <button (click)="openAddForm()"
            class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow">
            <i class="fas fa-plus mr-1"></i> Add Table
          </button>
        </div>
      </div>

      <div class="px-6 py-4">
        <p *ngIf="actionError" class="text-red-600 text-sm mb-4">{{ actionError }}</p>
        <p *ngIf="loadError" class="text-red-600 text-sm mb-4">{{ loadError }}</p>
        <p *ngIf="isLoading" class="text-blueGray-400 text-sm mb-4">Loading tables...</p>

        <!-- Table cards grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" *ngIf="!isLoading">
          <div *ngFor="let table of tables; trackBy: trackByTableId"
            class="border rounded-lg p-4 text-center shadow-sm"
            [ngClass]="table.isActive ? 'border-emerald-300 bg-emerald-50' : 'border-blueGray-200 bg-blueGray-50'">
            <i class="fas fa-chair text-2xl mb-2" [ngClass]="table.isActive ? 'text-emerald-500' : 'text-blueGray-300'"></i>
            <p class="font-bold text-blueGray-700">#{{ table.number }}</p>
            <p class="text-xs text-blueGray-500 mb-2">{{ table.name }}</p>
            <p class="text-xs text-blueGray-400 mb-3"><i class="fas fa-users mr-1"></i>{{ table.capacity }}</p>
            <div class="flex justify-center gap-3">
              <button (click)="openEditForm(table)" class="text-blueGray-500 hover:text-blueGray-700"><i class="fas fa-pen"></i></button>
              <button (click)="deleteTable(table)" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          <p *ngIf="tables.length === 0" class="col-span-full text-center text-blueGray-400 py-6">No tables yet.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add / Edit modal -->
<div *ngIf="showForm" class="fixed z-50 inset-0 overflow-y-auto flex items-center justify-center p-4">
  <button type="button" class="fixed inset-0 bg-black opacity-50 border-0 cursor-default focus-visible:ring-2 focus-visible:ring-red-500" (click)="closeForm()" aria-label="Close table form"></button>
  <div class="relative bg-white rounded-lg shadow-xl w-full max-w-sm mx-auto z-10 overflow-hidden">
    <div class="bg-red-600 px-6 py-4 text-white flex justify-between items-center">
      <h3 class="font-bold text-base uppercase">{{ editingId ? 'Edit Table' : 'Add Table' }}</h3>
      <button (click)="closeForm()" class="text-white hover:text-blueGray-200">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <form (ngSubmit)="save()" class="p-6 space-y-4">
      <div>
        <label for="tbl-number" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Table Number</label>
        <input id="tbl-number" type="number" min="1" [(ngModel)]="form.number" name="number" required
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <div>
        <label for="tbl-name" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Name</label>
        <input id="tbl-name" type="text" [(ngModel)]="form.name" name="name" required
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <div>
        <label for="tbl-capacity" class="block uppercase text-blueGray-600 text-xs font-bold mb-1">Capacity</label>
        <input id="tbl-capacity" type="number" min="1" [(ngModel)]="form.capacity" name="capacity"
          class="border-0 px-3 py-2 text-blueGray-600 bg-blueGray-50 rounded text-sm shadow w-full focus:outline-none focus:ring" />
      </div>
      <div class="flex items-center gap-2">
        <input id="tbl-active" type="checkbox" [(ngModel)]="form.isActive" name="isActive" class="rounded" />
        <label for="tbl-active" class="text-blueGray-600 text-sm">Active</label>
      </div>

      <p *ngIf="actionError" class="text-red-600 text-sm">{{ actionError }}</p>

      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="closeForm()" class="text-blueGray-500 text-xs font-bold uppercase px-4 py-2">Cancel</button>
        <button type="submit" [disabled]="isSaving || !form.name.trim() || form.number <= 0"
          class="bg-red-600 text-white active:bg-red-700 text-xs font-bold uppercase px-4 py-2 rounded shadow disabled:opacity-50">
          {{ isSaving ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
