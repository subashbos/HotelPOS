<div class="container mx-auto px-4 h-full">
  <div class="flex content-center items-center justify-center h-full">
    <div class="w-full lg:w-4/12 px-4">
      <div class="relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg rounded-lg bg-blueGray-200 border-0">
        <div class="rounded-t mb-0 px-6 py-6">
          <div class="text-center mb-3">
            <h6 class="text-blueGray-500 text-lg font-bold">Reset Password</h6>
          </div>
          <div class="text-center text-blueGray-400 font-semibold text-sm">
            <span *ngIf="step === 'request'">Enter your username to receive a reset code by email</span>
            <span *ngIf="step === 'confirm'">Enter the code you received and a new password</span>
          </div>
          <hr class="mt-4 border-b-1 border-blueGray-300" />
        </div>
        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">

          <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            <span class="block sm:inline text-xs font-semibold">{{ errorMessage }}</span>
          </div>
          <div *ngIf="infoMessage" class="bg-emerald-100 border border-emerald-400 text-emerald-700 px-4 py-3 rounded relative mb-4" role="status">
            <span class="block sm:inline text-xs font-semibold">{{ infoMessage }}</span>
          </div>

          <form *ngIf="step === 'request'" (ngSubmit)="requestCode()">
            <div class="relative w-full mb-3">
              <label class="block uppercase text-blueGray-600 text-xs font-bold mb-2" for="fp-username">Username</label>
              <input id="fp-username" name="username" type="text"
                class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full"
                placeholder="Username" [(ngModel)]="username" required [disabled]="isLoading" />
            </div>
            <div class="text-center mt-6">
              <button type="submit" [disabled]="isLoading || !username.trim()"
                class="bg-blueGray-800 text-white active:bg-blueGray-600 text-sm font-bold uppercase px-6 py-3 rounded shadow hover:shadow-lg w-full disabled:opacity-50">
                {{ isLoading ? 'Sending...' : 'Send Reset Code' }}
              </button>
            </div>
          </form>

          <form *ngIf="step === 'confirm'" (ngSubmit)="confirmReset()">
            <div class="relative w-full mb-3">
              <label class="block uppercase text-blueGray-600 text-xs font-bold mb-2" for="fp-code">Reset Code</label>
              <input id="fp-code" name="code" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code"
                class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full text-center tracking-widest"
                placeholder="000000" [(ngModel)]="code" required [disabled]="isLoading" />
            </div>
            <div class="relative w-full mb-3">
              <label class="block uppercase text-blueGray-600 text-xs font-bold mb-2" for="fp-newpass">New Password</label>
              <input id="fp-newpass" name="newPassword" type="password"
                class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full"
                placeholder="New password" [(ngModel)]="newPassword" required [disabled]="isLoading" />
            </div>
            <div class="relative w-full mb-3">
              <label class="block uppercase text-blueGray-600 text-xs font-bold mb-2" for="fp-confirmpass">Confirm Password</label>
              <input id="fp-confirmpass" name="confirmPassword" type="password"
                class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full"
                placeholder="Confirm new password" [(ngModel)]="confirmPassword" required [disabled]="isLoading" />
            </div>
            <div class="text-center mt-6">
              <button type="submit" [disabled]="isLoading || !code.trim() || !newPassword"
                class="bg-blueGray-800 text-white active:bg-blueGray-600 text-sm font-bold uppercase px-6 py-3 rounded shadow hover:shadow-lg w-full disabled:opacity-50">
                {{ isLoading ? 'Resetting...' : 'Reset Password' }}
              </button>
            </div>
            <div class="text-center mt-3">
              <a href="javascript:void(0)" class="text-blueGray-500 text-xs" (click)="backToRequest()">Request a new code</a>
            </div>
          </form>
        </div>
      </div>
      <div class="flex flex-wrap mt-6 relative">
        <div class="w-full text-center">
          <a [routerLink]="['/login']" class="text-blueGray-200">
            <small>Back to Sign In</small>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
