<div class="container mx-auto px-4 h-full">
  <div class="flex content-center items-center justify-center h-full">
    <div class="w-full lg:w-4/12 px-4">
      <div
        class="relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg rounded-lg bg-blueGray-200 border-0"
      >
        <div class="rounded-t mb-0 px-6 py-6">
          <div class="text-center mb-3">
            <h6 class="text-blueGray-500 text-lg font-bold">HotelPOS</h6>
          </div>
          <div class="text-center text-blueGray-400 font-semibold text-sm">
            <span>Sign in to access your dashboard</span>
          </div>
          <hr class="mt-4 border-b-1 border-blueGray-300" />
        </div>
        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">
          
          <!-- Error Alert Banner -->
          <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            <span class="block sm:inline text-xs font-semibold">{{ errorMessage }}</span>
          </div>

          <form (ngSubmit)="onSubmit()">
            <ng-container *ngIf="!requiresTwoFactor">
              <div class="relative w-full mb-3">
                <label
                  class="block uppercase text-blueGray-600 text-xs font-bold mb-2"
                  for="username"
                >
                  Username
                </label>
                <input
                  id="username"
                  name="username"
                  type="text"
                  class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150"
                  placeholder="Username"
                  [(ngModel)]="credentials.username"
                  required
                  [disabled]="isLoading"
                />
              </div>

              <div class="relative w-full mb-3">
                <label
                  class="block uppercase text-blueGray-600 text-xs font-bold mb-2"
                  for="password"
                >
                  Password
                </label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150"
                  placeholder="Password"
                  [(ngModel)]="credentials.password"
                  required
                  [disabled]="isLoading"
                />
              </div>
            </ng-container>

            <ng-container *ngIf="requiresTwoFactor">
              <div class="text-center text-blueGray-500 text-xs mb-4">
                Signed in as <strong>{{ credentials.username }}</strong>
              </div>

              <div class="relative w-full mb-3">
                <label
                  class="block uppercase text-blueGray-600 text-xs font-bold mb-2"
                  for="totpCode"
                >
                  Authentication Code
                </label>
                <input
                  id="totpCode"
                  name="totpCode"
                  type="text"
                  inputmode="numeric"
                  maxlength="6"
                  autocomplete="one-time-code"
                  class="border-0 px-3 py-3 placeholder-blueGray-300 text-blueGray-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150 text-center tracking-widest"
                  placeholder="000000"
                  [(ngModel)]="totpCode"
                  required
                  [disabled]="isLoading"
                />
              </div>

              <div class="text-right mb-3">
                <a
                  href="javascript:void(0)"
                  class="text-blueGray-500 text-xs"
                  (click)="useDifferentAccount()"
                >
                  Use a different account
                </a>
              </div>
            </ng-container>

            <div class="text-center mt-6">
              <button
                class="bg-blueGray-800 text-white active:bg-blueGray-600 text-sm font-bold uppercase px-6 py-3 rounded shadow hover:shadow-lg outline-none focus:outline-none mr-1 mb-1 w-full ease-linear transition-all duration-150 flex items-center justify-center cursor-pointer disabled:opacity-50"
                type="submit"
                [disabled]="isLoading"
              >
                <span *ngIf="isLoading" class="mr-2 inline-block animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
                {{ isLoading ? 'Signing In...' : (requiresTwoFactor ? 'Verify' : 'Sign In') }}
              </button>
            </div>
          </form>
        </div>
      </div>
      <div class="flex flex-wrap mt-6 relative">
        <div class="w-1/2">
          <a [routerLink]="['/forgot-password']" class="text-blueGray-200">
            <small>Forgot password?</small>
          </a>
        </div>
        <div class="w-1/2 text-right">
          <a [routerLink]="['/auth/register']" class="text-blueGray-200">
            <small>Create new account</small>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
